<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<style>
    *{
        background-image: linear-gradient(to right, red, purple);
    }
    .container{
        display: flex;
        justify-content: center;
        border: 2px solid black;
        max-height: 400px;
        min-height: 40px;
        max-width: 200px;
        min-width: 40px;
        border-radius: 10px;
        text-align: center;
        
        backdrop-filter: blur(500px);
        /* backface-visibility: hidden; */
    }
    i{
        border: 2px solid black;
        padding: 20px;
        font-size: 20px;
        margin: 20px;

        border-radius: 5px;
    }
    </style>
<body>
    <div class="container">
        <div class="box">
            <div class="logo">
                <i class="fa-solid fa-car"></i>
            </div>
            <div class="head" style="font-weight: bold;">
                Premium Collection
            </div>
            <div class="dash">
                ──────
            </div>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Libero iusto deserunt odio beatae dolor
                voluptates.
            </p>
        </div>
    </div>
</body>

</html>
